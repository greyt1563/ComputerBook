<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: #1f2937;
            background: #f8fafc;
        }

        main {
            max-width: 560px;
            padding: 24px;
            text-align: center;
        }

        a {
            color: #1d4ed8;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Redirecting...</h1>
        <p id="message">Opening the file from GitHub.</p>
        <p><a id="fallback" href="https://github.com/greyt1563/ComputerBook">Open repository</a></p>
    </main>
    <script>
        const prefix = "/ComputerBook/";
        const path = window.location.pathname;

        if (/\.pdf$/i.test(path) && path.includes(prefix)) {
            const repositoryPath = path.slice(path.indexOf(prefix) + prefix.length);
            const target = `https://github.com/greyt1563/ComputerBook/raw/main/${repositoryPath}`;
            const fallback = document.getElementById("fallback");
            fallback.href = target;
            fallback.textContent = "Open PDF";
            window.location.replace(target);
        } else {
            document.getElementById("message").textContent = "That page was not found.";
        }
    </script>
</body>
</html>
