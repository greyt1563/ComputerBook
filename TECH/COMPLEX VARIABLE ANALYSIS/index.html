<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPLEX VARIABLE ANALYSIS</title>
    <style>
        :root {
            --bg1: #f0f7ff;
            --bg2: #fffdf7;
            --panel: rgba(255, 255, 255, 0.94);
            --border: #d9e5f2;
            --text: #1f2937;
            --muted: #6b7280;
            --folder: #0f766e;
            --file: #334155;
            --accent: #1d4ed8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 32%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            padding: 24px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 30px;
            line-height: 1.2;
        }

        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
        }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .nav-link:hover,
        .entry-link:hover {
            text-decoration: underline;
        }

        .list {
            list-style: none;
            margin: 0;
            padding: 0;
            border-top: 1px solid var(--border);
        }

        .entry {
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            align-items: start;
        }

        .kind {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding-top: 3px;
        }

        .kind.dir { color: var(--folder); }
        .kind.file { color: var(--file); }

        .entry-link {
            color: var(--text);
            text-decoration: none;
            word-break: break-word;
        }

        .empty {
            padding: 16px 0 4px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <h1>COMPLEX VARIABLE ANALYSIS</h1>
            <p class="subtitle">TECH / COMPLEX VARIABLE ANALYSIS</p>
            <div class="nav">
                <a class="nav-link" href="../../">Library Home</a>
                <a class="nav-link" href="./../">Parent Folder</a>
            </div>
            <ul class="list" id="directory-list"></ul>
        </div>
    </div>
    <script>
        const entries = [
    {
        "name":  "[SOLUTIONS] Brown - Student Solutions Manual to Accompany Complex Variables and Application [8th Edition].pdf",
        "href":  "%5BSOLUTIONS%5D%20Brown%20-%20Student%20Solutions%20Manual%20to%20Accompany%20Complex%20Variables%20and%20Application%20%5B8th%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "An Introduction to Complex Analysis.pdf",
        "href":  "An%20Introduction%20to%20Complex%20Analysis.pdf",
        "type":  "file"
    },
    {
        "name":  "Basic Complex Analysis, Third Ed.pdf",
        "href":  "Basic%20Complex%20Analysis%2C%20Third%20Ed.pdf",
        "type":  "file"
    },
    {
        "name":  "Brown, Churchill - Complex Variables and Application [8th Edition].pdf",
        "href":  "Brown%2C%20Churchill%20-%20Complex%20Variables%20and%20Application%20%5B8th%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "Brown, Churchill - Complex Variables and Application [9th Edition].pdf",
        "href":  "Brown%2C%20Churchill%20-%20Complex%20Variables%20and%20Application%20%5B9th%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "Complex Analysis for Mathematics and Engineering, 3rd Edition.pdf",
        "href":  "Complex%20Analysis%20for%20Mathematics%20and%20Engineering%2C%203rd%20Edition.pdf",
        "type":  "file"
    },
    {
        "name":  "Conway - A Course in Functional Analysis.pdf",
        "href":  "Conway%20-%20A%20Course%20in%20Functional%20Analysis.pdf",
        "type":  "file"
    },
    {
        "name":  "Conway - Functions of One Complex Variable [2nd Edition].pdf",
        "href":  "Conway%20-%20Functions%20of%20One%20Complex%20Variable%20%5B2nd%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "Functions of One Complex Variable I, Second Edition1.pdf",
        "href":  "Functions%20of%20One%20Complex%20Variable%20I%2C%20Second%20Edition1.pdf",
        "type":  "file"
    },
    {
        "name":  "John B. Conway.pdf",
        "href":  "John%20B.%20Conway.pdf",
        "type":  "file"
    },
    {
        "name":  "Needham - Visual Complex Analysis.pdf",
        "href":  "Needham%20-%20Visual%20Complex%20Analysis.pdf",
        "type":  "file"
    },
    {
        "name":  "Rudin - Real and Complex Analysis [3rd Edition].pdf",
        "href":  "Rudin%20-%20Real%20and%20Complex%20Analysis%20%5B3rd%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "Spiegel, Lipschutz, Schiller, Spellman -Schaum\u0027s Complex Variables [2nd Edition].pdf",
        "href":  "Spiegel%2C%20Lipschutz%2C%20Schiller%2C%20Spellman%20-Schaum\u0027s%20Complex%20Variables%20%5B2nd%20Edition%5D.pdf",
        "type":  "file"
    },
    {
        "name":  "University of Wisconsin, Madison.pdf",
        "href":  "University%20of%20Wisconsin%2C%20Madison.pdf",
        "type":  "file"
    }
];
        const list = document.getElementById("directory-list");

        if (!entries.length) {
            const empty = document.createElement("li");
            empty.className = "empty";
            empty.textContent = "This folder is empty.";
            list.appendChild(empty);
        } else {
            for (const entry of entries) {
                const item = document.createElement("li");
                item.className = "entry";

                const kind = document.createElement("div");
                kind.className = "kind " + entry.type;
                kind.textContent = entry.type === "dir" ? "[DIR]" : "[FILE]";

                const link = document.createElement("a");
                link.className = "entry-link";
                if (entry.type === "file" && entry.href.toLowerCase().endsWith(".pdf")) {
                    const pdfPath = new URL(entry.href, window.location.href).pathname;
                    const repositoryPath = pdfPath.includes("/ComputerBook/")
                        ? pdfPath.slice(pdfPath.indexOf("/ComputerBook/") + "/ComputerBook/".length)
                        : pdfPath.replace(/^.*?\/books\//i, "");
                    link.href = `https://github.com/greyt1563/ComputerBook/raw/main/${repositoryPath}`;
                    link.target = "_blank";
                    link.rel = "noopener";
                } else {
                    link.href = entry.href;
                }
                link.textContent = entry.name;

                item.appendChild(kind);
                item.appendChild(link);
                list.appendChild(item);
            }
        }
    </script>
</body>
</html>
