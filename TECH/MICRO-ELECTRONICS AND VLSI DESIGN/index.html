<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICRO-ELECTRONICS AND VLSI DESIGN</title>
    <style>
        :root {
            --bg1: #f0f7ff;
            --bg2: #fffdf7;
            --panel: rgba(255, 255, 255, 0.94);
            --border: #d9e5f2;
            --text: #1f2937;
            --muted: #6b7280;
            --folder: #0f766e;
            --file: #334155;
            --accent: #1d4ed8;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 32%),
                linear-gradient(135deg, var(--bg1), var(--bg2));
            padding: 24px;
        }

        .shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 6px;
            font-size: 30px;
            line-height: 1.2;
        }

        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 22px;
        }

        .nav-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .nav-link:hover,
        .entry-link:hover {
            text-decoration: underline;
        }

        .list {
            list-style: none;
            margin: 0;
            padding: 0;
            border-top: 1px solid var(--border);
        }

        .entry {
            display: grid;
            grid-template-columns: 64px 1fr;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            align-items: start;
        }

        .kind {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            padding-top: 3px;
        }

        .kind.dir { color: var(--folder); }
        .kind.file { color: var(--file); }

        .entry-link {
            color: var(--text);
            text-decoration: none;
            word-break: break-word;
        }

        .empty {
            padding: 16px 0 4px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <h1>MICRO-ELECTRONICS AND VLSI DESIGN</h1>
            <p class="subtitle">TECH / MICRO-ELECTRONICS AND VLSI DESIGN</p>
            <div class="nav">
                <a class="nav-link" href="../../">Library Home</a>
                <a class="nav-link" href="./../">Parent Folder</a>
            </div>
            <ul class="list" id="directory-list"></ul>
        </div>
    </div>
    <script>
        const entries = [
    {
        "name":  "Algorithms for VLSI Physical Design Automation.pdf",
        "href":  "Algorithms%20for%20VLSI%20Physical%20Design%20Automation.pdf",
        "type":  "file"
    },
    {
        "name":  "Basic VLSI Design by Douglas A. Pucknell \u0026 Kamran Eshranghian.pdf",
        "href":  "Basic%20VLSI%20Design%20by%20Douglas%20A.%20Pucknell%20%26%20Kamran%20Eshranghian.pdf",
        "type":  "file"
    },
    {
        "name":  "By Karen Parnell \u0026 Nick Mehta.pdf",
        "href":  "By%20Karen%20Parnell%20%26%20Nick%20Mehta.pdf",
        "type":  "file"
    },
    {
        "name":  "CMOS Circuit Design, Layout, and Simulation, 3rd Edition (IEEE Press Series on Microelectronic Systems).pdf",
        "href":  "CMOS%20Circuit%20Design%2C%20Layout%2C%20and%20Simulation%2C%203rd%20Edition%20(IEEE%20Press%20Series%20on%20Microelectronic%20Systems).pdf",
        "type":  "file"
    },
    {
        "name":  "CMOS Digital Integrated Circuits_ Analysis and Deisgn.pdf",
        "href":  "CMOS%20Digital%20Integrated%20Circuits_%20Analysis%20and%20Deisgn.pdf",
        "type":  "file"
    },
    {
        "name":  "Jan M. Rabaey, Anantha Chandrakasan, and Borivoje Nikolic.pdf",
        "href":  "Jan%20M.%20Rabaey%2C%20Anantha%20Chandrakasan%2C%20and%20Borivoje%20Nikolic.pdf",
        "type":  "file"
    },
    {
        "name":  "Modern VLSI Design_ IP-Based Design, Fourth Edition.pdf",
        "href":  "Modern%20VLSI%20Design_%20IP-Based%20Design%2C%20Fourth%20Edition.pdf",
        "type":  "file"
    },
    {
        "name":  "P T R Prentice Hall.pdf",
        "href":  "P%20T%20R%20Prentice%20Hall.pdf",
        "type":  "file"
    },
    {
        "name":  "Reference.pdf",
        "href":  "Reference.pdf",
        "type":  "file"
    },
    {
        "name":  "The VHDL Cookbook (First Edition).pdf",
        "href":  "The%20VHDL%20Cookbook%20(First%20Edition).pdf",
        "type":  "file"
    },
    {
        "name":  "VHDL by Perry.pdf",
        "href":  "VHDL%20by%20Perry.pdf",
        "type":  "file"
    },
    {
        "name":  "VHDL Reference.pdf",
        "href":  "VHDL%20Reference.pdf",
        "type":  "file"
    }
];
        const list = document.getElementById("directory-list");

        if (!entries.length) {
            const empty = document.createElement("li");
            empty.className = "empty";
            empty.textContent = "This folder is empty.";
            list.appendChild(empty);
        } else {
            for (const entry of entries) {
                const item = document.createElement("li");
                item.className = "entry";

                const kind = document.createElement("div");
                kind.className = "kind " + entry.type;
                kind.textContent = entry.type === "dir" ? "[DIR]" : "[FILE]";

                const link = document.createElement("a");
                link.className = "entry-link";
                if (entry.type === "file" && entry.href.toLowerCase().endsWith(".pdf")) {
                    const pdfPath = new URL(entry.href, window.location.href).pathname;
                    const repositoryPath = pdfPath.includes("/ComputerBook/")
                        ? pdfPath.slice(pdfPath.indexOf("/ComputerBook/") + "/ComputerBook/".length)
                        : pdfPath.replace(/^.*?\/books\//i, "");
                    link.href = `https://github.com/greyt1563/ComputerBook/raw/main/${repositoryPath}`;
                    link.target = "_blank";
                    link.rel = "noopener";
                } else {
                    link.href = entry.href;
                }
                link.textContent = entry.name;

                item.appendChild(kind);
                item.appendChild(link);
                list.appendChild(item);
            }
        }
    </script>
</body>
</html>
